---
- name: Workstation setup
  hosts: localhost
  connection: local
  gather_facts: true
  become: true
  vars:
    target_user: "{{ lookup('env','SUDO_USER') | default(ansible_user_id, true) }}"
    target_home: "/home/{{ target_user }}"
    bootloader: "systemd-boot"
    kernel_cmdline_file: "/etc/kernel/cmdline"
    grub_default_file: "/etc/default/grub"
    grub_cfg_path: "/boot/grub/grub.cfg"
    nvidia_modules: "nvidia nvidia_modeset nvidia_uvm nvidia_drm"
    hypr_env:
      WLR_NO_HARDWARE_CURSORS: "1"
      LIBVA_DRIVER_NAME: "nvidia"
      GBM_BACKEND: "nvidia-drm"
      __GLX_VENDOR_LIBRARY_NAME: "nvidia"
      WLR_RENDERER: "vulkan"
    repo_packages:
      - base-devel
      - git
      - curl
      - wget
      - unzip
      - zip
      - tar
      - jq
      - fzf
      - ripgrep
      - fd
      - openssl
      - openssh
      - cmake
      - firefox
      - thunderbird
      - networkmanager
      - bluez
      - bluez-utils
      - docker
      - docker-compose
      - yazi
      - imagemagick
      - bat
      - p7zip
      - pipewire
      - wireplumber
      - pipewire-alsa
      - pipewire-pulse
      - pipewire-jack
      - hyprland
      - xdg-desktop-portal
      - xdg-desktop-portal-gtk
      - xdg-desktop-portal-hyprland
      - waybar
      - wl-clipboard
      - brightnessctl
      - nvidia-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - egl-wayland
      - vulkan-icd-loader
      - lib32-vulkan-icd-loader
      - rustup
      - nodejs
      - npm
      - chezmoi
    aur_packages:
      - yay-bin
      - bitwarden
      - nvidia-container-toolkit
    docker_daemon_config:
      features:
        buildkit: true
      runtimes:
        nvidia:
          path: "nvidia-container-runtime"
          runtimeArgs: []
    extra_groups:
      - video
      - input
      - render
      - docker
  pre_tasks:
    - name: Ensure pacman parallel downloads
      lineinfile:
        path: /etc/pacman.conf
        regexp: '^#?ParallelDownloads'
        line: 'ParallelDownloads = 10'
        state: present
    - name: Ensure pacman color
      lineinfile:
        path: /etc/pacman.conf
        regexp: '^#?Color'
        line: 'Color'
        state: present
    - name: Pacman full upgrade
      pacman:
        update_cache: true
        upgrade: true
  tasks:
    - name: Install repository packages
      pacman:
        name: "{{ repo_packages }}"
        state: present
    - name: Ensure target user exists
      user:
        name: "{{ target_user }}"
      register: user_check
    - name: Ensure extra groups exist
      group:
        name: "{{ item }}"
        state: present
      loop: "{{ extra_groups }}"
    - name: Install yay manually if missing
      become: true
      become_user: "{{ target_user }}"
      shell: |
        set -e
        if ! command -v yay >/dev/null 2>&1; then
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          git clone https://aur.archlinux.org/yay-bin.git
          cd yay-bin
          makepkg -si --noconfirm
          rm -rf "$tmpdir"
        fi
      args:
        executable: /bin/bash
    - name: Install AUR packages with yay
      become: true
      become_user: "{{ target_user }}"
      shell: |
        set -e
        yay -S --noconfirm --needed {{ aur_packages | join(' ') }}
      args:
        executable: /bin/bash
    - name: Add user to extra groups
      user:
        name: "{{ target_user }}"
        groups: "{{ extra_groups | join(',') }}"
        append: true
    - name: Configure NVIDIA modules in mkinitcpio
      replace:
        path: /etc/mkinitcpio.conf
        regexp: '^MODULES=.*'
        replace: "MODULES=({{ nvidia_modules }})"
      register: mkinit_mods
    - name: Rebuild initramfs if modules changed
      command: mkinitcpio -P
      when: mkinit_mods is changed
    - name: Ensure kernel cmdline contains nvidia_drm.modeset=1 (systemd-boot)
      lineinfile:
        path: "{{ kernel_cmdline_file }}"
        insertafter: EOF
        line: "nvidia_drm.modeset=1"
      when: bootloader == 'systemd-boot' and kernel_cmdline_file is file
    - name: Ensure GRUB cmdline contains nvidia_drm.modeset=1
      replace:
        path: "{{ grub_default_file }}"
        regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")([^"]*)(")'
        replace: '\1\2 nvidia_drm.modeset=1\3'
      when: bootloader == 'grub'
      register: grub_cmdline
    - name: Regenerate grub config
      command: grub-mkconfig -o "{{ grub_cfg_path }}"
      when: bootloader == 'grub' and grub_cmdline is changed
    - name: Ensure /etc/environment exists
      file:
        path: /etc/environment
        state: touch
        mode: '0644'
    - name: Set NVIDIA & Hyprland environment variables
      lineinfile:
        path: /etc/environment
        regexp: '^{{ item.key }}='
        line: '{{ item.key }}={{ item.value }}'
      loop: "{{ hypr_env | dict2items }}"
    - name: Create Docker config directory
      file:
        path: /etc/docker
        state: directory
        mode: '0755'
    - name: Write docker daemon.json
      copy:
        dest: /etc/docker/daemon.json
        content: "{{ docker_daemon_config | to_nice_json }}"
        mode: '0644'
      notify: Restart Docker
    - name: Enable and start Docker
      systemd:
        name: docker.service
        enabled: true
        state: started
    - name: Enable containerd
      systemd:
        name: containerd.service
        enabled: true
        state: started
      ignore_errors: true
    - name: Enable NetworkManager
      systemd:
        name: NetworkManager.service
        enabled: true
        state: started
    - name: Enable Bluetooth
      systemd:
        name: bluetooth.service
        enabled: true
        state: started
    - name: Install Rust toolchain stable
      become: true
      become_user: "{{ target_user }}"
      shell: |
        set -e
        rustup toolchain install stable
        rustup default stable
      args:
        executable: /bin/bash
    - name: Display post-provision message
      debug:
        msg: "Provisioning complete. Reboot recommended. After reboot test GPU Docker: docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi"
  handlers:
    - name: Restart Docker
      systemd:
        name: docker.service
        state: restarted
